<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>UNIDADE EXCELÊNCIA</title>

<style>

/* ===== BODY / BACKGROUND ===== */
body{
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  color: #fff;

  background-image:
    linear-gradient(rgba(12,25,30,0.60), rgba(12,25,30,0.60)),
    url('https://raw.githubusercontent.com/SI-Ramon/ranking/main/ranking/img/unidades.png');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

@media (max-width: 480px){
  body{
    background-attachment: scroll;
    background-position: center top;
  }
}

/* ===== layout ===== */

.wrap{
  max-width:1000px;
  margin:auto;
  padding:30px;
  padding-bottom:110px;
}

/* ===== header ===== */

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 8px;
}

h1.title {
  font-size: 28px;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 700;
  color: #fff;
}

/* ===== emblema ===== */

.club-emblem {
  width: 60px;
  height: 60px;
  object-fit: contain;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.18);
  background: rgba(0,0,0,0.08);
  box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

.header.no-emblem {
  justify-content: center;
}

/* ===== podium ===== */

.podium{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin: 18px 0 40px;
  justify-items:center;
}

/* ===== cards ===== */

.card{
  position: relative;
  overflow: visible;
  background: rgba(255,255,255,.08);
  padding: 100px 20px 20px;
  border-radius: 15px;
  text-align: center;
  min-height: 260px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  transition: transform .18s ease;
}

.card:hover{ transform: translateY(-6px); }

.gold { background: rgba(255,215,0,.34); }
.silver { background: rgba(192,192,192,.28); }
.bronze { background: rgba(205,127,50,.28); }

/* ===== avatar ===== */

.avatar{
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 92px;
  height: 92px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.12);
  z-index: 2;
}

.avatar-sm{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid rgba(255,255,255,.35);
}

/* ===== coroa ===== */

.crown{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  font-size:32px;
  z-index:3;
  text-shadow:0 3px 8px rgba(0,0,0,.6);
}

/* ===== textos ===== */

.card h3{
  margin-top: 2px;
  margin-bottom: 6px;
}

.card strong{
  display:block;
  font-size:18px;
  margin-bottom:8px;
}

.card p{
  margin:0;
}

/* ===== tabela ===== */

table{
  width:100%;
  border-collapse:collapse;
  margin-top:8px;
}

th,td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,.12);
}

.right{text-align:right;}

.rowflex{
  display:flex;
  align-items:center;
  gap:12px;
}

/* ===== footer ===== */

.page-footer{
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(180deg, rgba(12,25,30,0.0), rgba(0,0,0,0.45));
  padding: 12px 0;
  text-align: center;
}

/* ===== responsivo ===== */

@media (max-width:900px){
  .podium{grid-template-columns:repeat(3,1fr);}
  .avatar{
    width: 88px;
    height: 88px;
    top: 20px;
  }
}

@media (max-width:480px){
  .avatar{
    width: 76px;
    height: 76px;
    top: 24px;
  }

  .card h3{
    margin-top: 0;
    margin-bottom: 4px;
  }
}

@media (max-width:320px){
  .podium{grid-template-columns:repeat(1,1fr);}
  .avatar{
    width: 70px;
    height: 70px;
    top: 24px;
  }
}

</style>
</head>

<body>

<div class="wrap">

<div id="headerWrap" class="header">
<img id="clubEmblem" class="club-emblem" src="">
<h1 class="title">UNIDADE EXCELÊNCIA</h1>
</div>

<div class="podium" id="podium"></div>

<h2>📋 Ranking Completo</h2>

<table>

<thead>
<tr>
<th>#</th>
<th>Unidade</th>
<th class="right">Pontos</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<div id="status"></div>

</div>

<footer class="page-footer">
<div id="updated">Atualizando...</div>
</footer>

<script>

const EMBLEM_URL = "https://raw.githubusercontent.com/SI-Ramon/ranking/main/ranking/img/GUARDIOES.png";

const SHEET_ID = "1XSBKPMg4nlzAJpACvZ5hCumqOyFPFIIRqV60gghP43E";
const SHEET_NAME = "UNIDADES";

const query = encodeURIComponent("select A, B, C where A is not null order by B desc");

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tq=${query}`;

function parseGViz(text){

const start=text.indexOf("{");
const end=text.lastIndexOf("}");

return JSON.parse(text.substring(start,end+1));

}

function normalizeDriveImage(raw){

if(!raw)return"";

let u=String(raw).trim();

const m=u.match(/IMAGE\(\"(.*)\"\)/i);
if(m)u=m[1];

const id=u.match(/\/d\/([^\/]+)/);
if(id)return`https://drive.google.com/uc?export=view&id=${id[1]}`;

return u;

}

function makeImg(url,cls){

const img=document.createElement("img");
img.className=cls;
img.src=url||"";

return img;

}

function loadEmblem(){

const img=document.getElementById("clubEmblem");

if(!EMBLEM_URL){
img.style.display="none";
return;
}

img.src=EMBLEM_URL;

}

function updateTime(){

document.getElementById("updated").innerText=
"Atualizado em: "+new Date().toLocaleString("pt-BR");

}

async function load(){

const res=await fetch(url);
const text=await res.text();
const data=parseGViz(text);

const rows=(data.table.rows||[]).map(r=>{

return{

name:r.c?.[0]?.v||"",
pts:r.c?.[1]?.v||0,
photo:normalizeDriveImage(r.c?.[2]?.v||"")

};

}).filter(x=>x.name);

const podium=document.getElementById("podium");
podium.innerHTML="";

const styles=["gold","silver","bronze","",""];

rows.slice(0,5).forEach((p,i)=>{

const div=document.createElement("div");
div.className="card "+styles[i];

if(i===0){
const crown=document.createElement("div");
crown.className="crown";
crown.innerHTML="👑";
div.appendChild(crown);
}

const img=makeImg(p.photo,"avatar");
div.appendChild(img);

const h3=document.createElement("h3");
h3.textContent=`${i+1}º Lugar`;
div.appendChild(h3);

const strong=document.createElement("strong");
strong.textContent=p.name;
div.appendChild(strong);

const pEl=document.createElement("p");
pEl.textContent=`${p.pts} pontos`;
div.appendChild(pEl);

podium.appendChild(div);

});

const tbody=document.getElementById("tbody");
tbody.innerHTML="";

rows.forEach((p,i)=>{

const tr=document.createElement("tr");

const td1=document.createElement("td");
td1.textContent=i+1;

const td2=document.createElement("td");

const wrap=document.createElement("div");
wrap.className="rowflex";

const img=makeImg(p.photo,"avatar-sm");
wrap.appendChild(img);

const span=document.createElement("span");
span.textContent=p.name;
wrap.appendChild(span);

td2.appendChild(wrap);

const td3=document.createElement("td");
td3.className="right";
td3.textContent=p.pts;

tr.appendChild(td1);
tr.appendChild(td2);
tr.appendChild(td3);

tbody.appendChild(tr);

});

updateTime();

}

loadEmblem();
load();

setInterval(load,60000);

</script>

</body>
</html>
